name: UR Staging QA Test

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code From Current Branch
        uses: actions/checkout@v2

      - name: Add Private SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.TG_PRIVATE_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Add GitHub Email & Username
        env:
          MY_EMAIL: ${{ secrets.TG_GITHUB_EMAIL }}
          MY_USERNAME: ${{ secrets.TG_GITHUB_USERNAME }}
        run: |
          git config --global user.email "$MY_EMAIL"
          git config --global user.name "$MY_USERNAME"

      - name: Use Node.js 16.x
        uses: actions/setup-node@v2
        with:
          node-version: 16.14.0

      - name: Setup PHP v7.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          extensions: cli, dev, curl, mbstring, xmlrpc

      - name: NPM, Composer Install & NPM Build
        run: |
          rm -rf node-modules
          npm install 
          composer install 
          npm run build
          composer install --no-dev
          mkdir user-registration
          rsync -rc --exclude-from="./.distignore" "./" "./user-registration" --delete --delete-excluded

      # Step to Zip the Plugin Files
      - name: Zip Plugin Files
        run: |
          cd user-registration
          zip -r ../user-registration.zip ./*

      # Upload and Install Plugin via WP-CLI
      - name: Upload and Install Plugin via WP-CLI
        env:
          Srv_IP: ${{ secrets.QA_AUTOMATION_SERVER_IP }}
          Srv_UsrName: ${{ secrets.QA_AUTOMATION_SERVER_USERNAME }}
          Server_PASS: ${{ secrets.QA_AUTOMATION_SERVER_PASS }}
        run: |
          # Upload the plugin file
          sshpass -p "$Server_PASS" scp -o StrictHostKeyChecking=no user-registration.zip $Srv_UsrName@$Srv_IP:/home/master/applications/ycrdmckpsu/public_html/urqatestfinal/
  
          # SSH into the server and install/activate the plugin using WP-CLI
          sshpass -p "$Server_PASS" ssh -o StrictHostKeyChecking=no $Srv_UsrName@$Srv_IP << EOF
          # Go to the WordPress directory (replace with the correct path)
          cd /home/master/applications/ycrdmckpsu/public_html/urqatestfinal/wordpress
  
          # Install the plugin via WP-CLI
          wp plugin install /home/master/applications/ycrdmckpsu/public_html/urqatestfinal/user-registration.zip --activate
  
          # Clean up
          rm -f /home/master/applications/ycrdmckpsu/public_html/urqatestfinal/user-registration.zip
          EOF

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
      - run: chrome --version

      - name: Set up Python 3.12.1
        uses: actions/setup-python@v3
        with:
          python-version: 3.12.1
      - run: python -v

      - name: Automation Test Script User Registration
        run: |
          mkdir python-code
          cd python-code
          git init
          git remote add origin git@github.com:wpeverest/UR-Automation.git
          git pull origin test-ur-free
          pip install -r requirements.txt
          chmod +x test_ur_free.sh
          bash ./test_ur_free.sh
        continue-on-error: true

      - name: Test Report Generation
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: Report
          path: python-code/results

      - name: Upload Test Report to Server
        if: success() || failure()
        env:
          Srv_IP: ${{ secrets.QA_AUTOMATION_SERVER_IP }}
          Srv_UsrName: ${{ secrets.QA_AUTOMATION_SERVER_USERNAME }}
          Server_PASS: ${{ secrets.QA_AUTOMATION_SERVER_PASS }}
        run: |
          sshpass -p "$Server_PASS" ssh -o StrictHostKeyChecking=no $Srv_UsrName@$Srv_IP 'rm -rf /home/master/applications/ycrdmckpsu/public_html/urqatestfinal/wordpress/wp-content/plugins/user-registration/reports/*'
          sshpass -p "$Server_PASS" scp -o StrictHostKeyChecking=no -r python-code/results/* $Srv_UsrName@$Srv_IP:/home/master/applications/ycrdmckpsu/public_html/urqatestfinal/wordpress/wp-content/plugins/user-registration/reports/
          echo "https://qatest.wptests.net/urqatestfinal/wordpress/wp-content/plugins/user-registration/reports/report.html"
          echo "https://qatest.wptests.net/urqatestfinal/wordpress/wp-content/plugins/user-registration/reports/test_report.html"
