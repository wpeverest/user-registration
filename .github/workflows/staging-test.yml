name: UR Staging QA Test

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code From Current Branch
        uses: actions/checkout@v2

      - name: Add Private SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.TG_PRIVATE_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Add GitHub Email & Username
        env:
          MY_EMAIL: ${{ secrets.TG_GITHUB_EMAIL }}
          MY_USERNAME: ${{ secrets.TG_GITHUB_USERNAME }}
        run: |
          git config --global user.email "$MY_EMAIL"
          git config --global user.name "$MY_USERNAME"

      - name: Build
        id: build
        uses: wpeverest/action-build@3.0.0
        with:
          generate-zip: true
          

      # Upload and Install Plugin via WP-CLI
      - name: Upload Plugin ZIP to Server Temp Folder
        env:
          Srv_IP: ${{ secrets.QA_AUTOMATION_SERVER_IP }}
          Srv_UsrName: ${{ secrets.QA_AUTOMATION_SERVER_USERNAME }}
          Server_PASS: ${{ secrets.QA_AUTOMATION_SERVER_PASS }}
        run: |
          sshpass -p "$Server_PASS" scp -o StrictHostKeyChecking=no user-registration.zip $Srv_UsrName@$Srv_IP:/tmp/

      - name: Install and Activate Plugin via WP-CLI
        run: |
          sshpass -p "$Server_PASS" ssh -o StrictHostKeyChecking=no $Srv_UsrName@$Srv_IP << EOF
          cd /home/master/applications/ycrdmckpsu/public_html/urqatest/
          wp plugin install /tmp/user-registration.zip --activate
          rm -f /tmp/user-registration.zip
          EOF

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
      - run: chrome --version

      - name: Set up Python 3.12.1
        uses: actions/setup-python@v3
        with:
          python-version: 3.12.1
      - run: python -v

      - name: Automation Test Script User Registration
        run: |
          mkdir python-code
          cd python-code
          git init
          git remote add origin git@github.com:wpeverest/UR-Automation.git
          git pull origin test-ur-free
          pip install -r requirements.txt
          chmod +x test_ur_free.sh
          bash ./test_ur_free.sh
        continue-on-error: true

      - name: Test Report Generation
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: Report
          path: python-code/results

      - name: Upload Test Report to Server
        if: success() || failure()
        env:
          Srv_IP: ${{ secrets.QA_AUTOMATION_SERVER_IP }}
          Srv_UsrName: ${{ secrets.QA_AUTOMATION_SERVER_USERNAME }}
          Server_PASS: ${{ secrets.QA_AUTOMATION_SERVER_PASS }}
        run: |
          sshpass -p "$Server_PASS" ssh -o StrictHostKeyChecking=no $Srv_UsrName@$Srv_IP 'rm -rf /home/master/applications/ycrdmckpsu/public_html/urqatest/wp-content/plugins/user-registration/reports/*'
          sshpass -p "$Server_PASS" scp -o StrictHostKeyChecking=no -r python-code/results/* $Srv_UsrName@$Srv_IP:/home/master/applications/ycrdmckpsu/public_html/urqatest/wp-content/plugins/user-registration/reports/
          echo "https://qatest.wptests.net/urqatest/wp-content/plugins/user-registration/reports/report.html"
          

      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Test Completed - UR Staging QA Report"
          body: "Test completed. View the report here: https://qatest.wptests.net/urqatest/wp-content/plugins/user-registration/reports/report.html"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: "QA Automation <${{ secrets.SMTP_USERNAME }}>"
